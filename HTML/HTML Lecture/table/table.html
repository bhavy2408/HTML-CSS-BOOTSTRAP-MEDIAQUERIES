<!Doctype html>
<html lang="US-EN">
	<head>
		<title>Table</title>
		<style>
			table{
				border-collapse: collapse;
				height: 300px;
				width: 600px;
			}
		</style>
	</head>
	<body>
		<!-- table tags -->
		<table border="1">
			<thead>
				<tr>
				<th>Model</th>
				<th>OS</th>
				<th>Display</th>
				<th>Ram</th>
				</tr>
			</thead>
			<tbody>
				<tr>
				<th>samsaung galaxy s7</th>
				<th rowspan="2">Android</th>
				<th>5.1</th>
				<th>4gb</th>
				</tr>
				<tr>
					<th>sony xpiria z5</th>
					<th>4.6</th>
					<th rowspan="2">2gb</th>
				</tr>
				<tr>
					<th>iphone 6s</th>
					<th>ios</th>
					<th>4.7</th>
				</tr>
			</tbody>
		</table>
	</body>
</html>
