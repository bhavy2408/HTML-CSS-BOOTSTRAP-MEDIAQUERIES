<!doctype html>
<html lang="US-EN">
	<head>
		<title>Tags</title>
	</head>
	<body>
		<!-- Address tag -->
		<address style="font-style: normal;">
			Name : Bhikhabhai<br>
			Email : bhikhabhai@gmial.com<br>
			Phone no : +91 99093492034<br>
			Area : katargam<br>
			City : Surat
		</address>

		<!--listnig tag -->
		<!-- 1 order list-->
		<ol start="2" type="A">
			<li>csk</li>
			<li>mi</li>
			<li>rr</li>
			<li>gt</li>
		</ol>
		<!-- unorder list -->
		<ul type="">
			<li>csk</li>
			<li>mi</li>
			<li>rr</li>
			<li>gt</li>
		</ul>
		<!-- discription list -->
		<dl>
			<dh>IPL Team</dh>
			<dd>csk</dd>
			<dd>mi</dd>
			<dd>rcb</dd>
			<dd>rr</dd>
		</dl>
		<!-- nested list -->
		<ul>
			<li>
				<dl>
					<dt>IPL TEAM</dt>
					<dd>
						<ol start="2" type="A">
							<li>csk</li>
							<li>mi</li>
							<li>rr</li>
							<li>gt</li>
							</ol>

					</dd>
				</dl>
			</li>
		</ul>



		<!-- select tags -->
		<select>
			<optgroup label="IPL TEAM">
			<option selected>Select Team</option>
			<option value="CSK">CSK</option>
			<option value="MI">MI</option>
			<option value="Rcb">RCB</option>
			<option value="GT">GT</option>
		</select>

		<!-- Datalist -->
		<input list="list" name="list">
		<datalist id="list">
			<option>CSK</option>
			<option>MI</option>
			<option>RCB</option>
			<option>GT</option>
		</datalist><br>

		<!-- Text Area -->
		<textarea cols="20" rows="10" style="resize: vertical;">
			
		</textarea>

	</body>
</html>
