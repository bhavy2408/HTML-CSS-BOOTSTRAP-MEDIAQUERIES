<html lang="US-EN">
	<head>
		<title>Audio and Video tag</title>
	</head>
	<body>
		<!--1.Audio tag -->
		<audio controls >
			<source src="./audio.mp3" type="audio/mp3">

		<audio controls src="./audio.mp3" type="audio/mp3">

		<!-- video tag -->
		<video controls>
			<source src="./video.mp4" type="video/mp4">
		</video>
