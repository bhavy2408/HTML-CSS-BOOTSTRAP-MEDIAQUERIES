<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <div class="container">
    <div class="row mt-5 border bg-secondary text-light rounded-4 p-3">
      <div class="col-4 mb-3">
        <label for="" class="form-lable">First Name</label>
        <input type="text" name="" id="" placeholder="first" class="form-control">
      </div>
      <div class="col-4">
        <label for="" class="form-lable">Middle Name</label>
        <input type="text" name="" id="" placeholder="middle" class="form-control">
      </div>
      <div class="col-4">
        <label for="" class="form-lable">last Name</label>
        <input type="text" name="" id="" placeholder="last" class="form-control">
      </div>
      <div class="col-12 mb-3">
        <label for="" class="form-lable">Course </label>
        <select class="form-select" aria-label="Default select example">
          <option selected>Course</option>
          <option value="1">BBA</option>
          <option value="2">B.Com</option>
          <option value="3">Msc.it</option>
        </select>
      </div>
      <div class="col-12 mb-3">
        <label for="" class="form-lable">Date Of Birth</label>
        <input type="date" name="" id="" placeholder="Date Of Birth" class="form-control">
      </div>
      <div class="col-12 mb-3">
        <label for="" class="form-lable">Applicant Phone no</label>
        <input type="number" name="" id="" placeholder="##### #####" class="form-control">
      </div>
      <div class="col-12 mb-3">
        <label for="" class="form-lable">Permenent Address</label>
        <input type="text" name="" id="" placeholder="Address" class="form-control">
      </div>
      <div class="col-6 mb-3">
        <input type="text" name="" id="" placeholder="city" class="form-control">
      </div>
      <div class="col-6 mb-3">
        <input type="text" name="" id="" placeholder="state" class="form-control">
      </div>
      <div class="col-6 mb-3">
        <input type="text" name="" id="" placeholder="zip-code" class="form-control">
      </div>
      <div class="col-6 mb-3">
        <select name="" id="" class="form-select">
          <option selected>Country</option>
          <option value="">India</option>
          <option value="">USA</option>
          <option value="">Germeny</option>
        </select>
      </div>
      <div>
        <button class="btn btn-primary" type="submit">submit
          
        </button>
      </div>
    </div>
  </div>

  <Script>
    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (() => {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      const forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }

          form.classList.add('was-validated')
        }, false)
      })
    })()
  </Script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
