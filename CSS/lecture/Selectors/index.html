    <!-- combinators Selector -->
    <!-- there are 4 types  
        1.child selector(>): selects direct children of an element
        2.descendant selector(space) : selects all descendants of an element
        3.Sibling selector(+): selects the next sibling of an element
        4.general sibling selector(~) : selects all siblings of an element that follow it
    -->
